<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital OEE - Plant Overview</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0..1,0" rel="stylesheet">
<style>
  :root{
    --accent:#2563eb;
    --nav:#020043;
    --surface:#FBFCFC;
    --navy:#0c1430;
    --cyan:#13c4d6;
    --main-card:#FBFCFC;
    --card:#FBFCFC;
    --border:rgba(0,0,0,.12);
    --border-strong:rgba(0,0,0,.18);
    --text:#242424;
    --text-soft:rgba(0,0,0,.72);
    --text-muted:rgba(0,0,0,.6);
    --green:#16a34a; --green-bg:#e9f8ef; --green-bd:#bfe6cd;
    --red:#dc2626;   --red-bg:#fdecec;   --red-bd:#f6c4c4;
    --amber:#d97706; --amber-bg:#fef3e0; --amber-bd:#f6dba9;
    --blue:#2563eb;  --blue-bg:#e9f0fe;  --blue-bd:#bcd1fb;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:#f6f9fe;color:var(--text);overflow:hidden;font-family:Roboto,system-ui,sans-serif;}

  /* ---- thin, hover-only scrollbars ---- */
  *{scrollbar-width:thin;scrollbar-color:transparent transparent;}
  *:hover{scrollbar-color:rgba(0,0,0,.28) transparent;}
  *::-webkit-scrollbar{width:7px;height:7px;}
  *::-webkit-scrollbar-button{display:none;width:0;height:0;}
  *::-webkit-scrollbar-track{background:transparent;}
  *::-webkit-scrollbar-thumb{background:transparent;border-radius:999px;}
  *:hover::-webkit-scrollbar-thumb{background:rgba(0,0,0,.28);}

  .page-titlebar{margin:0 40px;padding:16px 0 12px;display:flex;align-items:stretch;justify-content:space-between;gap:18px;min-width:0;}
  .page-titlegroup{display:flex;align-items:stretch;gap:86px;min-width:0;flex:1;}
  .page-title-copy{display:flex;flex-direction:column;justify-content:center;flex:0 0 auto;}
  .page-title{font-family:Roboto,var(--ix-font);font-size:20px;font-weight:700;line-height:1.6;letter-spacing:.15px;color:var(--navy);}
  .page-breadcrumb{position:relative;display:flex;align-items:center;gap:4px;margin-top:1px;color:var(--text-muted);font-size:13px;line-height:18px;letter-spacing:.16px;cursor:pointer;}
  .page-breadcrumb svg{width:16px;height:16px;color:var(--accent);flex-shrink:0;}

  .main-card-shell{margin:0 40px 40px;background:rgba(255,255,255,.64);border:1px solid var(--border);border-radius:12px;overflow:visible;display:grid;grid-template-columns:56px minmax(0,1fr);padding:0;height:calc(100vh - 158px);position:relative;}
  .app-side-nav{position:relative;z-index:25;width:56px;height:100%;background:linear-gradient(90deg,rgba(31,99,234,.08),rgba(31,99,234,.08)),#fff;border-right:1px solid var(--border);border-radius:12px 0 0 12px;padding:8px;display:flex;flex-direction:column;gap:8px;align-items:flex-start;overflow:hidden;transition:width .18s ease,box-shadow .18s ease;}
  .app-side-nav:hover,.app-side-nav:focus-within{width:220px;box-shadow:12px 0 28px rgba(15,23,42,.12);}
  .app-side-nav.is-collapsed{width:56px;box-shadow:none;}
  .app-side-nav.is-collapsed .app-side-label{opacity:0;}
  .app-side-btn{width:40px;height:40px;border:0;border-radius:7px;background:transparent;color:var(--text);display:flex;align-items:center;justify-content:flex-start;gap:12px;cursor:pointer;transition:background .15s,color .15s;width:100%;padding:0 8px;white-space:nowrap;position:relative;}
  .app-side-btn:before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:999px;background:transparent;}
  .app-side-btn:hover{background:rgba(31,99,234,.08);color:var(--text);}
  .app-side-btn:hover:before{background:var(--accent);}
  .app-side-btn.active{background:rgba(31,99,234,.12);color:var(--accent);}
  .app-side-btn.active:before{background:transparent;}
  .app-side-btn.active:hover:before{background:var(--accent);}
  .app-side-btn svg{width:24px;height:24px;fill:currentColor;flex:0 0 24px;}
  .app-side-label{font-family:Roboto,var(--ix-font);font-size:16px;font-weight:400;color:currentColor;opacity:0;transition:opacity .12s ease;}
  .app-side-nav:hover .app-side-label,.app-side-nav:focus-within .app-side-label{opacity:1;}
  .app-side-nav.is-collapsed:hover .app-side-label,.app-side-nav.is-collapsed:focus-within .app-side-label{opacity:0;}
  .app-content{min-width:0;min-height:0;height:100%;padding:24px;background:var(--main-card);overflow:visible;border-radius:0 12px 12px 0;}

  .plant-card{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;}

  /* ---- Plant overview ---- */
  .plant-layout{flex:1;min-height:0;display:grid;grid-template-columns:minmax(0,1fr) 25%;gap:16px;}
  .plant-scroll{min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:20px;}

  .plant-summary{display:flex;flex-direction:column;gap:12px;}
  .plant-summary-top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .plant-summary-title{font-size:16px;font-weight:700;color:var(--text);line-height:1.2;}
  .plant-summary-meta{font-size:12px;color:var(--text-muted);}

  /* Sidebar: outer card holding Needs Attention (60%) + ATLAS Insights (40%) */
  .plant-sidebar{min-height:0;background:#fff;border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;}
  .plant-sidebar-header{flex-shrink:0;padding:8px 16px 8px 24px;background:#F5F7F8;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .plant-sidebar-body{flex:1;min-height:0;padding:12px;display:flex;flex-direction:column;gap:12px;overflow:hidden;}

  .needs-attention-card{flex:6 1 0;min-height:0;border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:10px;overflow:hidden;}
  .needs-attention-head{flex-shrink:0;}
  .needs-attention-title{font-family:Roboto,var(--ix-font);font-size:16px;font-weight:700;line-height:150%;letter-spacing:.15px;color:var(--text);}
  .needs-attention-body{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
  .placeholder-line-card{border:1px solid var(--border);border-radius:10px;background:#f7f8fa;padding:10px;display:flex;flex-direction:column;gap:7px;flex-shrink:0;}
  .placeholder-bar{height:9px;border-radius:4px;background:#e3e6ec;}
  .placeholder-bar.w-short{width:35%;}
  .placeholder-bar.w-med{width:60%;}
  .placeholder-bar.w-full{width:100%;}

  .attention-line-card{border:1px solid var(--border);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;background:#fff;}
  .attention-line-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .attention-line-name{font-size:13px;font-weight:700;color:var(--text);}
  .attention-line-name span{font-weight:400;color:var(--text-muted);font-size:11px;}

  .attention-mini-metrics{display:flex;align-items:center;gap:12px;}
  .attention-metric-block{flex:1 1 0;min-width:0;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .attention-metric-divider{width:1px;align-self:stretch;background:var(--border);flex-shrink:0;}
  .attention-mini-metric{display:flex;flex-direction:column;gap:2px;}
  .attention-mini-value{font-family:Roboto,var(--ix-font);font-size:20px;font-weight:400;line-height:100%;}
  .attention-mini-value.good{color:var(--green);}
  .attention-mini-value.critical{color:var(--red);}
  .attention-mini-name{font-family:Roboto,var(--ix-font);font-size:10px;font-weight:400;line-height:10px;color:rgba(0,0,0,.6);}

  .causal-code{position:relative;display:flex;align-items:center;gap:8px;padding:10px 14px 10px 18px;border-radius:8px;font-size:14px;line-height:150%;letter-spacing:.15px;overflow:hidden;}
  .causal-code:before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;}
  .causal-code.planned{background:rgba(0,31,155,.10);}
  .causal-code.planned:before{background:#001F9B;}
  .causal-code.planned .causal-code-id,.causal-code.planned .causal-code-desc{color:#001F9B;}
  .causal-code.startstop{background:rgba(126,87,194,.10);}
  .causal-code.startstop:before{background:#7E57C2;}
  .causal-code.startstop .causal-code-id,.causal-code.startstop .causal-code-desc{color:#7E57C2;}
  .causal-code-id{font-weight:700;white-space:nowrap;padding-right:8px;border-right:1px solid rgba(0,0,0,.15);align-self:stretch;display:flex;align-items:center;}
  .causal-code-desc{font-size:11px;font-weight:400;}

  .atlas-card{flex:4 1 0;min-height:0;background:#F5F7F8;border-radius:12px;border:1px solid rgba(0,0,0,.12);padding:12px;display:flex;flex-direction:column;gap:10px;overflow:hidden;}
  .atlas-card-title{display:flex;align-items:center;gap:8px;font-family:Roboto,var(--ix-font);font-size:20px;font-weight:700;color:var(--accent);letter-spacing:.38px;line-height:normal;flex-shrink:0;}
  .atlas-card-title .material-symbols-outlined{font-size:22px;width:22px;height:22px;color:#ea580c;}
  .plant-insights{flex:1;min-height:0;min-width:0;overflow-x:hidden;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
  .plant-insight{position:relative;display:flex;align-items:center;gap:8px;padding:8px 26px 8px 10px;border-radius:8px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.06);font-size:12px;line-height:1.35;cursor:default;flex-shrink:0;min-width:0;box-sizing:border-box;}
  .plant-insight > span:not(.material-symbols-outlined){min-width:0;}
  .plant-insight.critical{color:#ef4444;}
  .plant-insight.warn{color:#f59e0b;}
  .plant-insight.info{color:#2563eb;}
  .plant-insight .material-symbols-outlined{font-size:16px;flex-shrink:0;}
  .plant-insight b{font-weight:700;}
  .plant-insight-expand{position:absolute;right:8px;top:7px;font-size:15px;opacity:0;transition:opacity .12s ease;}
  .plant-insight:hover .plant-insight-expand{opacity:.7;}

  .unit-list{display:flex;flex-direction:column;gap:10px;}
  .unit-acc{border:1px solid var(--border);border-radius:10px;background:#fff;overflow:hidden;}
  .unit-head{display:flex;align-items:center;gap:14px;padding:8px 12px;cursor:pointer;user-select:none;flex-wrap:nowrap;}
  .unit-toggle{width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0;order:99;}
  .unit-toggle .material-symbols-outlined{font-size:20px;transition:transform .25s ease;}
  .unit-acc.open .unit-toggle .material-symbols-outlined{transform:rotate(90deg);}
  .unit-name-block{display:flex;flex-direction:column;gap:2px;width:170px;flex:0 0 170px;overflow:hidden;}
  .unit-line-count,.unit-issue{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .unit-name-row{display:flex;align-items:center;gap:8px;}
  .unit-name{font-size:15px;font-weight:700;color:var(--text);}
  .unit-line-count{font-size:11.5px;color:var(--text-muted);}
  .unit-issue{font-size:11.5px;color:var(--red);display:flex;align-items:center;gap:4px;}
  .unit-issue .material-symbols-outlined{font-size:14px;}

  /* status chips (design system) — solid pill, white text */
  .status-chip{display:inline-flex;align-items:center;justify-content:center;font-family:Roboto,var(--ix-font);font-size:10px;font-weight:500;line-height:1;text-transform:uppercase;padding:4px 6px;border-radius:999px;white-space:nowrap;color:#fff;}
  .status-chip.critical{background:var(--red);}
  .status-chip.warn{background:var(--amber);}
  .status-chip.success{background:var(--green);}

  /* ---- KPI card row (unit accordion summary metrics) ---- */
  .unit-kpi-row{display:flex;align-items:stretch;gap:8px;flex:1 1 100%;min-width:0;}
  .kpi-card{position:relative;flex:1 1 0;min-width:0;display:flex;flex-direction:row;align-items:center;justify-content:space-between;gap:8px;padding:8px;padding-left:14px;border:1px solid var(--border);border-radius:8px;background:#fff;overflow:hidden;box-shadow:0 0 6px rgba(0,31,155,.12),0 0 2px rgba(0,31,155,.14),0 0 2px -2px rgba(0,31,155,.20);}
  .kpi-left{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .kpi-card:before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--border-strong);}
  .kpi-card.good:before{background:var(--green);}
  .kpi-card.warn:before{background:var(--amber);}
  .kpi-card.critical:before{background:var(--red);}
  .kpi-value-row{display:flex;align-items:baseline;gap:3px;}
  .kpi-value{font-family:Roboto,var(--ix-font);font-size:20px;font-weight:400;line-height:100%;color:#000;}
  .kpi-unit{font-family:Roboto,var(--ix-font);font-size:12px;font-weight:400;color:rgba(0,0,0,.32);}
  .kpi-name{font-family:Roboto,var(--ix-font);font-size:11px;font-weight:400;line-height:10px;color:rgba(0,0,0,.87);}
  .kpi-target{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
  .kpi-target-label{font-family:Roboto,var(--ix-font);font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:rgba(0,0,0,.6);}
  .kpi-target-chip{font-family:Roboto,var(--ix-font);font-size:10px;font-weight:300;color:#000;background:#F0F1F3;border-radius:999px;padding:4px 6px;line-height:1;}

  .unit-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s ease,padding .28s ease;padding:0 16px;}
  .unit-body>*{min-height:0;overflow:hidden;}
  .unit-acc.open .unit-body{grid-template-rows:1fr;padding:16px 16px 14px;}
  .line-card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}

  /* ---- Line card (ported from index.html unit-card) ---- */
  .pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:3px 10px;border-radius:999px;white-space:nowrap;}
  .pill-green{background:var(--green-bg);color:var(--green);}
  .pill-red{background:var(--red-bg);color:var(--red);}
  .pill-amber{background:var(--amber-bg);color:var(--amber);}
  .unit-card{background:var(--main-card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:.12s;}
  .unit-card:hover{border-color:var(--accent);box-shadow:0 4px 14px -4px rgba(10,16,32,.12);}
  .unit-card .label-xs{font-size:10px;font-weight:700;color:var(--text-muted);}
  .unit-card .val{font-size:12px;font-weight:600;color:var(--text);}
  .unit-card .val.critical{color:var(--red);}
  .unit-card .val.warn{color:var(--amber);}
  .unit-card .val.good{color:var(--green);}
  .event-info-icon{width:14px;height:14px;color:var(--amber);flex:0 0 14px;display:block;}
  .next-event-alert{height:31px;line-height:1.25;overflow:hidden;}
  .unit-kpi-row .next-event-alert{height:auto;align-self:stretch;}
  .next-event-alert span{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .progress-track{height:6px;border-radius:99px;background:#e6eaf0;overflow:hidden;flex:1;}
  .progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#2563eb,#13c4d6);}

  .material-symbols-outlined{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;font-size:20px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;-webkit-font-feature-settings:'liga';-webkit-font-smoothing:antialiased;font-variation-settings:'FILL' 1;}

  .hierarchy-overlay{position:fixed;width:350px;height:500px;background:#fff;border-radius:12px;box-shadow:0 18px 44px -8px rgba(10,16,32,.28);display:flex;flex-direction:column;z-index:260;overflow:hidden;}
  .hierarchy-head{display:flex;align-items:center;justify-content:space-between;padding:16px 32px 0 32px;flex-shrink:0;}
  .hierarchy-title{font-family:Roboto,var(--ix-font);font-size:20px;font-weight:700;color:var(--text);line-height:1.2;}
  .hierarchy-close{border:0;background:transparent;color:var(--accent);cursor:pointer;padding:2px;display:flex;align-items:center;justify-content:center;}
  .hierarchy-tabs{display:flex;align-items:center;gap:24px;padding:16px 32px 0 32px;}
  .hierarchy-tab{border:0;background:transparent;padding:0 0 10px 0;font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--text-muted);cursor:pointer;position:relative;text-transform:uppercase;}
  .hierarchy-tab.active{color:var(--accent);}
  .hierarchy-tab.active:after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--accent);border-radius:2px 2px 0 0;}
  .hierarchy-search{margin:16px 32px 0 32px;position:relative;display:flex;align-items:center;border:1px solid var(--border-strong);border-radius:12px;padding:0 12px;height:38px;gap:8px;}
  .hierarchy-search .material-symbols-outlined{color:var(--accent);font-size:19px;}
  .hierarchy-search input{flex:1;border:0;outline:0;font-size:13px;color:var(--text);background:transparent;}
  .hierarchy-body{flex:1;overflow-y:auto;padding:16px 32px;display:flex;flex-direction:column;gap:0;}
  .hierarchy-node{display:flex;flex-direction:column;}
  .hierarchy-row{display:flex;align-items:center;gap:6px;min-height:28px;}
  .hierarchy-toggle{width:20px;height:20px;border:0;background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;}
  .hierarchy-toggle .material-symbols-outlined{font-size:18px;transition:transform .12s ease;}
  .hierarchy-toggle-leaf .material-symbols-outlined{font-size:16px;}
  .hierarchy-toggle.is-open .material-symbols-outlined{transform:rotate(90deg);}
  .hierarchy-toggle.is-spacer{visibility:hidden;pointer-events:none;}
  .hierarchy-label{display:flex;align-items:center;gap:2px;font-size:16px;line-height:150%;letter-spacing:.15px;color:var(--text);cursor:pointer;opacity:.38;transition:opacity .12s ease;flex:1;}
  .hierarchy-label:hover,.hierarchy-label:focus-visible{opacity:1;}
  .hierarchy-label.is-selected{opacity:1;font-weight:700;}
  .hierarchy-label .material-symbols-outlined{font-size:18px;color:var(--text-muted);}
  .hierarchy-label-text{flex:1;}
  .hierarchy-radio{width:14px;height:14px;accent-color:var(--accent);flex-shrink:0;cursor:pointer;margin-left:auto;}
  .hierarchy-children{display:flex;flex-direction:column;gap:0;padding-left:26px;margin-top:0;}
  .hierarchy-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:16px 32px;}
  .hierarchy-actions button{height:auto;border-radius:12px;font-family:Roboto,var(--ix-font);font-size:14px;font-weight:500;cursor:pointer;padding:6px 15px;text-transform:uppercase;}
  .hierarchy-secondary{border:0;background:transparent;color:var(--accent);}
  .hierarchy-primary{border:0;background:var(--accent);color:#fff;}
  .hierarchy-primary:hover{filter:brightness(.94);}
</style>
<script src="smart-factory-header.js?v=11" defer></script>
</head>
<body class="min-h-screen flex flex-col">
  <smart-factory-header active-screen="monitoring"></smart-factory-header>

  <div id="hierarchyModal" class="hierarchy-overlay" style="display:none;">
    <div class="hierarchy-head">
      <div class="hierarchy-title">Hierarchy</div>
      <button class="hierarchy-close" type="button" onclick="closeHierarchyModal()" aria-label="Close hierarchy modal">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="hierarchy-tabs">
      <button class="hierarchy-tab active" type="button">ASSETS</button>
      <button class="hierarchy-tab" type="button">TEAM</button>
    </div>
    <div class="hierarchy-search">
      <span class="material-symbols-outlined">search</span>
      <input id="hierarchySearchInput" type="text" placeholder="Search assets..." autocomplete="off" oninput="renderHierarchyTree()">
    </div>
    <div class="hierarchy-body" id="hierarchyBody"></div>
    <div class="hierarchy-actions">
      <button class="hierarchy-secondary" type="button" onclick="closeHierarchyModal()">CANCEL</button>
      <button class="hierarchy-primary" type="button" onclick="applyHierarchySelection()">APPLY</button>
    </div>
  </div>

  <div class="page-titlebar">
    <div class="page-titlegroup">
      <div class="page-title-copy">
        <div class="page-title">Digital OEE</div>
        <div class="page-breadcrumb" id="pageBreadcrumb" role="button" tabindex="0" onclick="openHierarchyModal()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openHierarchyModal();}">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 6h4v4H6zM14 4h4v4h-4zM14 14h4v4h-4zM10 8h2a2 2 0 012 2v4"/>
          </svg>
          <span>Sandy Plant</span>
        </div>
      </div>
    </div>
  </div>

  <div class="main-card-shell">
    <nav class="app-side-nav" id="appSideNav" aria-label="Plant navigation" onmouseenter="this.classList.remove('is-collapsed')" onmouseleave="this.classList.remove('is-collapsed')">
      <button id="sidePlantOverview" class="app-side-btn active" type="button" aria-label="Overview" title="Overview">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 9.2c0-.66.54-1.2 1.2-1.2h1.6c.66 0 1.2.54 1.2 1.2v8.6c0 .66-.54 1.2-1.2 1.2H6.2c-.66 0-1.2-.54-1.2-1.2V9.2Zm5-4c0-.66.54-1.2 1.2-1.2h1.6c.66 0 1.2.54 1.2 1.2v12.6c0 .66-.54 1.2-1.2 1.2h-1.6c-.66 0-1.2-.54-1.2-1.2V5.2Zm5 7c0-.66.54-1.2 1.2-1.2h1.6c.66 0 1.2.54 1.2 1.2v5.6c0 .66-.54 1.2-1.2 1.2h-1.6c-.66 0-1.2-.54-1.2-1.2v-5.6Z"/>
        </svg>
        <span class="app-side-label">Overview</span>
      </button>
      <button id="sidePlantSecondary" class="app-side-btn" type="button" aria-label="Lines" title="Lines">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M14.06 9.02 15 9.96l-5.6 5.6H8.46v-.94l5.6-5.6Zm3.69-.56c.33-.33.33-.86 0-1.19l-1.02-1.02a.84.84 0 0 0-1.19 0l-.8.8 2.21 2.21.8-.8ZM5 4h10c1.1 0 2 .9 2 2v.68l-2 2V6H5v12h12v-2.68l2-2V18c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2Zm2 4h5v2H7V8Zm0 4h3v2H7v-2Z"/>
        </svg>
        <span class="app-side-label">Lines</span>
      </button>
    </nav>
    <main class="app-content">
      <div class="plant-card">
        <div class="plant-layout">
          <div class="plant-scroll" id="plantScroll">
            <div class="plant-summary">
              <div class="plant-summary-top">
                <div class="plant-summary-title">Unit Performance Overview</div>
              </div>
            </div>
            <div class="unit-list" id="unitList"></div>
          </div>
          <aside class="plant-sidebar" id="plantSidebar"></aside>
        </div>
      </div>
    </main>
  </div>

<script>
const HIERARCHY_TREE = [
  { id:'sandy-plant', name:'Sandy Plant', icon:'domain', children:[
    { id:'unit-afa', name:'AFA', icon:'factory', children:[
      { id:'afa1', name:'AFA 1', children:[] },
      { id:'afa2', name:'AFA 2', children:[] },
      { id:'afa3', name:'AFA 3', children:[] },
      { id:'afa10', name:'AFA 10', children:[] },
      { id:'afa11', name:'AFA 11', children:[] }
    ] },
    { id:'unit-pkg', name:'PKG', icon:'factory', children:[
      { id:'pkg-straight', name:'PKG Straight', children:[] },
      { id:'pkg-bulk', name:'PKG Bulk', children:[] },
      { id:'pkg-wing', name:'PKG Wing', children:[] }
    ] },
    { id:'unit-nfa', name:'NFA', icon:'factory', children:[
      { id:'nfa1', name:'NFA 1', children:[] },
      { id:'nfa2', name:'NFA 2', children:[] },
      { id:'nfa3', name:'NFA 3', children:[] }
    ] }
  ] }
];

const hierarchyState = {
  selectedId: 'sandy-plant',
  expanded: new Set()
};

function hierarchyCollectExpandedByDefault(nodes, set){
  nodes.forEach(node => {
    if(node.children && node.children.length){
      set.add(node.id);
      hierarchyCollectExpandedByDefault(node.children, set);
    }
  });
}

function openHierarchyModal(){
  const modal = document.getElementById('hierarchyModal');
  const breadcrumb = document.getElementById('pageBreadcrumb');
  if(!modal || !breadcrumb) return;
  hierarchyState.expanded = new Set();
  hierarchyCollectExpandedByDefault(HIERARCHY_TREE, hierarchyState.expanded);
  const searchInput = document.getElementById('hierarchySearchInput');
  if(searchInput) searchInput.value = '';
  renderHierarchyTree();
  const rect = breadcrumb.getBoundingClientRect();
  modal.style.top = `${rect.bottom + 8}px`;
  modal.style.left = `${rect.left}px`;
  modal.style.display = 'flex';
}

function closeHierarchyModal(){
  const modal = document.getElementById('hierarchyModal');
  if(modal) modal.style.display = 'none';
}

function hierarchyToggle(id){
  if(hierarchyState.expanded.has(id)) hierarchyState.expanded.delete(id);
  else hierarchyState.expanded.add(id);
  renderHierarchyTree();
}

function hierarchySelect(id){
  hierarchyState.selectedId = id;
  renderHierarchyTree();
}

function hierarchyNodeMatchesQuery(node, query){
  if(node.name.toLowerCase().includes(query)) return true;
  if(node.children) return node.children.some(child => hierarchyNodeMatchesQuery(child, query));
  return false;
}

function renderHierarchyNodes(nodes, query){
  return nodes.filter(node => !query || hierarchyNodeMatchesQuery(node, query)).map(node => {
    const hasChildren = node.children && node.children.length > 0;
    const isOpen = hierarchyState.expanded.has(node.id) || Boolean(query);
    const isSelected = hierarchyState.selectedId === node.id;
    const toggleHtml = hasChildren
      ? `<button type="button" class="hierarchy-toggle${isOpen ? ' is-open' : ''}" onclick="hierarchyToggle('${node.id}')" aria-label="Toggle ${node.name}"><span class="material-symbols-outlined">chevron_right</span></button>`
      : `<span class="hierarchy-toggle hierarchy-toggle-leaf"><span class="material-symbols-outlined">hdr_weak</span></span>`;
    const iconHtml = node.icon ? `<span class="material-symbols-outlined">${node.icon}</span>` : '';
    const childrenHtml = hasChildren && isOpen
      ? `<div class="hierarchy-children">${renderHierarchyNodes(node.children, query)}</div>`
      : '';
    return `
      <div class="hierarchy-node">
        <div class="hierarchy-row">
          ${toggleHtml}
          <label class="hierarchy-label${isSelected ? ' is-selected' : ''}">
            ${iconHtml}
            <span class="hierarchy-label-text">${node.name}</span>
            <input type="radio" name="hierarchySelection" class="hierarchy-radio" value="${node.id}" ${isSelected ? 'checked' : ''} onchange="hierarchySelect('${node.id}')">
          </label>
        </div>
        ${childrenHtml}
      </div>
    `;
  }).join('');
}

function renderHierarchyTree(){
  const body = document.getElementById('hierarchyBody');
  if(!body) return;
  const query = (document.getElementById('hierarchySearchInput')?.value || '').trim().toLowerCase();
  body.innerHTML = renderHierarchyNodes(HIERARCHY_TREE, query) || '<div class="hierarchy-empty" style="font-size:12px;color:var(--text-muted);">No assets found.</div>';
}

function findHierarchyNode(nodes, id){
  for(const node of nodes){
    if(node.id === id) return node;
    if(node.children){
      const found = findHierarchyNode(node.children, id);
      if(found) return found;
    }
  }
  return null;
}

function applyHierarchySelection(){
  const id = hierarchyState.selectedId;
  closeHierarchyModal();
  const node = findHierarchyNode(HIERARCHY_TREE, id);
  if(node && (!node.children || node.children.length === 0)){
    window.location.href = 'line-monitoring.html';
  }
}

document.addEventListener('click', e => {
  const overlay = document.getElementById('hierarchyModal');
  const breadcrumb = document.getElementById('pageBreadcrumb');
  if(!overlay || overlay.style.display === 'none') return;
  const path = typeof e.composedPath === 'function' ? e.composedPath() : [e.target];
  if(!path.includes(overlay) && !path.includes(breadcrumb)) closeHierarchyModal();
});

/* ---- Unit / Line performance data ---- */
const PLANT_UNITS = [
  { id:'unit-afa', name:'AFA', oee:67, oeeTarget:75, util:58, gqDay:106, gqMtd:99, scrap:2.4,
    lines:[
      { id:'afa1', name:'AFA1', status:'running', oee:76, oeeTarget:75, gqShift:97, scrap:2.3, issue:null, spark:[4,5,4,6,5,7,6,7] },
      { id:'afa2', name:'AFA2', status:'idle', oee:17, oeeTarget:75, gqShift:22, scrap:2.7, issue:'Waiting for Material', spark:[6,4,3,2,1,1,1,1] },
      { id:'afa3', name:'AFA3', status:'running', oee:81, oeeTarget:75, gqShift:104, scrap:2.5, issue:null, spark:[5,6,7,6,7,8,7,8] },
      { id:'afa10', name:'AFA10', status:'running', oee:78, oeeTarget:75, gqShift:100, scrap:2.5, issue:null, spark:[6,6,7,7,7,8,7,7] },
      { id:'afa11', name:'AFA11', status:'running', oee:80, oeeTarget:75, gqShift:103, scrap:2.4, issue:null, spark:[5,6,6,7,8,7,8,8] }
    ]
  },
  { id:'unit-pkg', name:'AFA PKG', oee:56, oeeTarget:70, util:58, gqDay:107, gqMtd:100, scrap:2.7,
    lines:[
      { id:'pkg-straight', name:'PKG Straight', status:'running', oee:69, oeeTarget:70, gqShift:98, scrap:2.6, issue:null, spark:[5,5,6,5,6,6,6,7] },
      { id:'pkg-bulk', name:'PKG Bulk', status:'blocked', oee:44, oeeTarget:70, gqShift:61, scrap:3.1, issue:'High Scrap', spark:[6,5,4,4,3,3,3,3] },
      { id:'pkg-wing', name:'PKG Wing', status:'running', oee:64, oeeTarget:70, gqShift:93, scrap:2.4, issue:null, spark:[5,5,6,6,6,6,7,6] }
    ]
  },
  { id:'unit-nfa', name:'NFA', oee:58, oeeTarget:72, util:58, gqDay:120, gqMtd:107, scrap:2.3,
    lines:[
      { id:'nfa1', name:'NFA1', status:'blocked', oee:41, oeeTarget:72, gqShift:70, scrap:2.6, issue:'Behind Shift Target', spark:[6,5,5,4,4,4,3,4] },
      { id:'nfa2', name:'NFA2', status:'running', oee:70, oeeTarget:72, gqShift:101, scrap:2.2, issue:null, spark:[5,6,6,7,7,7,7,8] },
      { id:'nfa3', name:'NFA3', status:'running', oee:63, oeeTarget:72, gqShift:96, scrap:2.1, issue:null, spark:[5,5,6,6,6,7,6,7] }
    ]
  },
  { id:'unit-bdss', name:'BDSS', oee:79, oeeTarget:75, util:58, gqDay:105, gqMtd:103, scrap:2.5,
    lines:[
      { id:'bdss1', name:'BDSS1', status:'running', oee:81, oeeTarget:75, gqShift:104, scrap:2.4, issue:null, spark:[6,6,7,7,8,8,8,8] },
      { id:'bdss2', name:'BDSS2', status:'running', oee:77, oeeTarget:75, gqShift:101, scrap:2.6, issue:null, spark:[6,6,6,7,7,7,7,7] }
    ]
  }
];

const CAUSAL_CODES = {
  'afa2': { code:'Z2.C14.S1', desc:'Line 2 Awaiting Material Replenishment', type:'startstop' },
  'pkg-bulk': { code:'Z5.C22.S4', desc:'Bulk Changeover Setup Exceeding Standard', type:'planned' },
  'nfa1': { code:'Z5.C30.S2', desc:'Track 3 Consecutive Covers Missing', type:'startstop' }
};

function lineIsCritical(line){ return line.status === 'idle' || line.status === 'blocked' || (line.oeeTarget - line.oee) >= 20; }
function lineCriticalityScore(line){
  if(line.status === 'idle' || line.status === 'blocked') return 3;
  if((line.oeeTarget - line.oee) >= 20) return 2;
  if((line.oeeTarget - line.oee) > 0) return 1;
  return 0;
}
function unitStatus(unit){
  const hasIdle = unit.lines.some(l => l.status === 'idle');
  const hasBlocked = unit.lines.some(l => l.status === 'blocked');
  if(hasIdle || hasBlocked) return 'critical';
  if(unit.oee < unit.oeeTarget - 8) return 'attention';
  return 'healthy';
}
function metricClass(value, target, invert){
  const ok = invert ? value <= target : value >= target;
  return ok ? 'good' : 'critical';
}
function kpiCard(name, value, unitLabel, target, cls){
  return `
    <div class="kpi-card ${cls}">
      <div class="kpi-left">
        <div class="kpi-value-row"><span class="kpi-value">${value}</span><span class="kpi-unit">${unitLabel}</span></div>
        <span class="kpi-name">${name}</span>
      </div>
      <div class="kpi-target">
        <span class="kpi-target-label">Target</span>
        <span class="kpi-target-chip">${target}</span>
      </div>
    </div>`;
}
function miniMetric(name, value, unitLabel, target, cls){
  return `
    <div class="attention-metric-block">
      <div class="attention-mini-metric">
        <span class="attention-mini-value ${cls}">${value}${unitLabel}</span>
        <span class="attention-mini-name">${name}</span>
      </div>
      <div class="kpi-target">
        <span class="kpi-target-label">Target</span>
        <span class="kpi-target-chip">${target}</span>
      </div>
    </div>`;
}

function renderPlantOverview(){
  const criticalUnits = PLANT_UNITS.filter(u => unitStatus(u) === 'critical');
  const idleLines = PLANT_UNITS.flatMap(u => u.lines).filter(l => l.status === 'idle');
  const worst = PLANT_UNITS.flatMap(u => u.lines.map(l => ({...l, unit:u.name}))).reduce((acc,l) => (l.oeeTarget-l.oee) > (acc.oeeTarget-acc.oee) ? l : acc);
  const scrapUnit = PLANT_UNITS.reduce((a,b) => b.scrap > a.scrap ? b : a);
  const attentionLines = PLANT_UNITS.flatMap(u => u.lines.map(l => ({...l, unit:u.name})))
    .filter(lineIsCritical)
    .sort((a,b) => lineCriticalityScore(b) - lineCriticalityScore(a));
  const needsAttentionCount = attentionLines.length;

  const insights = [];
  if(idleLines.length){
    insights.push({ type:'critical', icon:'error', html:`<b>${idleLines[0].name}</b> idle &mdash; ${idleLines[0].issue}. Reassign WO or expedite material to limit OEE loss.` });
  }
  insights.push({ type:'critical', icon:'trending_down', html:`<b>${worst.name}</b> is the main OEE loss driver in ${worst.unit} (${worst.oee}% vs ${worst.oeeTarget}%).` });
  if(scrapUnit.scrap >= 2.6){
    insights.push({ type:'warn', icon:'warning', html:`Scrap trending above threshold in <b>${scrapUnit.name}</b> (${scrapUnit.scrap}%). Review changeover setup.` });
  }
  insights.push({ type:'info', icon:'lightbulb', html:`AFA is running ${PLANT_UNITS[0].util}% utilization with spare OEE headroom &mdash; a good candidate for the next changeover.` });
  insights.push({ type:'info', icon:'insights', html:`NFA's GQ Day is 120% of target &mdash; consider shifting slack capacity to units below target.` });

  const sidebar = document.getElementById('plantSidebar');
  sidebar.innerHTML = `
    <div class="plant-sidebar-header">
      <span class="needs-attention-title">Plant Overview</span>
    </div>
    <div class="plant-sidebar-body">
      <div class="needs-attention-card">
        <div class="needs-attention-head">
          <span class="needs-attention-title">Needs Attention (${needsAttentionCount})</span>
        </div>
        <div class="needs-attention-body">
          ${attentionLines.map(line => {
            const lineStatus = line.status === 'idle' ? 'critical' : line.status === 'blocked' ? 'critical' : 'success';
            const lineStatusLabel = line.status === 'idle' ? 'Idle' : line.status === 'blocked' ? 'Blocked' : 'Running';
            const hasIssue = Boolean(line.issue);
            const causal = CAUSAL_CODES[line.id];
            return `
            <div class="attention-line-card" onclick="openLine('${line.id}')">
              <div class="attention-line-top">
                <span class="attention-line-name">${line.name} <span>&middot; ${line.unit}</span></span>
                <span class="status-chip ${lineStatus}">${lineStatusLabel}</span>
              </div>
              ${causal ? `<div class="causal-code ${causal.type}"><span class="causal-code-id">${causal.code}</span><span class="causal-code-desc">${causal.desc}</span></div>` : ''}
              <div class="attention-mini-metrics">
                ${miniMetric('OEE', line.oee, '%', `${line.oeeTarget}%`, metricClass(line.oee, line.oeeTarget))}
                <div class="attention-metric-divider"></div>
                ${miniMetric('Scrap', line.scrap, '%', '2.5%', metricClass(line.scrap, 2.5, true))}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <div class="atlas-card">
        <div class="atlas-card-title"><span class="material-symbols-outlined">auto_awesome</span>ATLAS Insights</div>
        <div class="plant-insights">
          ${insights.map(i => `
            <div class="plant-insight ${i.type}">
              <span class="material-symbols-outlined">${i.icon}</span>
              <span>${i.html}</span>
              <span class="material-symbols-outlined plant-insight-expand">open_in_full</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;

  const sortedUnits = [...PLANT_UNITS].sort((a,b) => {
    const rank = { critical:0, attention:1, healthy:2 };
    return rank[unitStatus(a)] - rank[unitStatus(b)];
  });

  document.getElementById('unitList').innerHTML = sortedUnits.map(unit => {
    const status = unitStatus(unit);
    const criticalCount = unit.lines.filter(lineIsCritical).length;
    const isOpen = unitState.openId === unit.id;
    const sortedLines = [...unit.lines].sort((a,b) => {
      if(a.id === 'afa10') return -1;
      if(b.id === 'afa10') return 1;
      return lineCriticalityScore(b) - lineCriticalityScore(a);
    });
    const statusChip = `<span class="status-chip ${status === 'critical' ? 'critical' : status === 'attention' ? 'warn' : 'success'}">${status === 'critical' ? 'Critical' : status === 'attention' ? 'Attention' : 'Healthy'}</span>`;

    const legacyHead = `
        <div class="unit-head" onclick="toggleUnit('${unit.id}')">
          <span class="unit-toggle"><span class="material-symbols-outlined">chevron_right</span></span>
          <div class="unit-name-block">
            <div class="unit-name-row">
              <span class="unit-name">${unit.name}</span>
              ${statusChip}
            </div>
            <span class="unit-line-count">${unit.lines.length} lines${criticalCount ? ` &middot; ${criticalCount} need attention` : ''}</span>
          </div>
          <div class="unit-kpi-row">
            ${kpiCard('OEE', unit.oee, '%', `${unit.oeeTarget}%`, metricClass(unit.oee, unit.oeeTarget))}
            ${kpiCard('Utilization', unit.util, '%', '65%', metricClass(unit.util, 65))}
            ${kpiCard('GQ Day', unit.gqDay, '%', '100%', metricClass(unit.gqDay, 100))}
            ${kpiCard('GQ MTD', unit.gqMtd, '%', '100%', metricClass(unit.gqMtd, 100))}
            ${kpiCard('Scrap', unit.scrap, '%', '2.5%', metricClass(unit.scrap, 2.5, true))}
          </div>
        </div>`;

    return `
      <div class="unit-acc ${status}${isOpen ? ' open' : ''}" data-unit="${unit.id}">
        ${legacyHead}
        <div class="unit-body">
          <div class="line-card-grid">
            ${sortedLines.map(line => {
              const oeeCls = metricClass(line.oee, line.oeeTarget);
              const scrapCls = metricClass(line.scrap, 2.5, true);
              const pillCls = line.status === 'idle' ? 'pill-red' : line.status === 'blocked' ? 'pill-red' : 'pill-green';
              const statusLabel = line.status === 'idle' ? 'Idle' : line.status === 'blocked' ? 'Blocked' : 'Running';
              const plannedQty = 3800;
              const actualQty = Math.round(plannedQty * line.gqShift / 100);
              const hasIssue = Boolean(line.issue);
              return `
              <div class="unit-card${lineIsCritical(line) ? ' is-critical' : ''}" onclick="openLine('${line.id}')">
                <div class="flex items-center justify-between mb-2">
                  <span class="font-extrabold text-[14px]">${line.name}</span>
                  <div class="flex items-center gap-2">
                    <span class="pill ${pillCls}">${statusLabel}</span>
                    <svg width="14" height="14" fill="var(--accent)" viewBox="0 0 24 24" aria-hidden="true" title="Open Line Monitoring"><path d="M19 19H5V5h7V3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
                  </div>
                </div>
                <div class="grid grid-cols-2 gap-y-1.5 mb-2">
                  <div><div class="label-xs">OEE:</div><div class="val ${oeeCls}">${line.oee}%</div></div>
                  <div><div class="label-xs">OEE Target:</div><div class="val">${line.oeeTarget}%</div></div>
                  <div><div class="label-xs">GQ Shift:</div><div class="val">${line.gqShift}%</div></div>
                  <div><div class="label-xs">Scrap:</div><div class="val ${scrapCls}">${line.scrap}%</div></div>
                </div>
                <div class="flex items-center gap-2 mb-2">
                  <div class="progress-track"><div class="progress-fill" style="width:${Math.min(96,(actualQty/plannedQty)*100)}%;background:${line.status === 'idle' || line.status === 'blocked' ? 'var(--red)' : ''};"></div></div>
                  <span class="text-[11px] font-semibold whitespace-nowrap" style="color:var(--text-soft);">${actualQty.toLocaleString('en-US')} Pieces</span>
                </div>
                <div class="next-event-alert text-[10.5px] rounded-lg px-2.5 py-2 border flex items-center gap-1.5" style="color:${hasIssue ? '#7a1d1d' : 'var(--text-soft)'};background:${hasIssue ? 'var(--red-bg)' : '#fff'};border-color:${hasIssue ? 'var(--red-bd)' : 'var(--border)'};">
                  ${hasIssue ? '<svg class="event-info-icon" style="color:var(--red);" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="9"/><path stroke-linecap="round" d="M12 8v5"/><path stroke-linecap="round" d="M12 16h.01"/></svg>' : ''}
                  <span><b>${hasIssue ? 'Current Issue:' : 'Status:'}</b> ${hasIssue ? line.issue : 'No active issues'}</span>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

const unitState = { openId: 'unit-afa' };
function toggleUnit(id){
  const prevId = unitState.openId;
  const newId = prevId === id ? null : id;
  unitState.openId = newId;
  const list = document.getElementById('unitList');
  if(prevId){
    const prevEl = list.querySelector(`.unit-acc[data-unit="${prevId}"]`);
    if(prevEl) prevEl.classList.remove('open');
  }
  if(newId){
    const newEl = list.querySelector(`.unit-acc[data-unit="${newId}"]`);
    if(newEl) newEl.classList.add('open');
  }
}
function openLine(id){
  window.location.href = 'line-monitoring.html';
}

renderPlantOverview();
</script>
</body>
</html>
