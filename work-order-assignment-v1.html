<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Order Assignment</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{
    --navy:#0c1430;
    --cyan:#13c4d6;
    --accent:#2563eb;
    --bg:#eef1f5;
    --card:#ffffff;
    --border:#e2e7ee;
    --border-strong:#cbd5e1;
    --text:#1a2332;
    --text-soft:#4a5d72;
    --text-muted:#8a9ab0;
    --green:#16a34a; --green-bg:#e9f8ef; --green-bd:#bfe6cd;
    --red:#dc2626;   --red-bg:#fdecec;   --red-bd:#f6c4c4;
    --amber:#d97706; --amber-bg:#fef3e0; --amber-bd:#f6dba9;
    --blue:#2563eb;  --blue-bg:#e9f0fe;  --blue-bd:#bcd1fb;
    --purple:#9333ea; --purple-bg:#f4e9fc; --purple-bd:#e3c4f7;
    --orange:#ea580c; --orange-bg:#fef0e6; --orange-bd:#fbd2b0;
    --gray-bg:#f1f4f8;
    --darkred:#7f1d1d; --darkred-bg:#fbe2e2;
    --ix-font:'Siemens Sans','Segoe UI',system-ui,sans-serif;
  }
  *{font-family:var(--ix-font);}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:#c3cdda;border-radius:4px;}

  .bg-toolbar{height:48px;background:var(--navy);}

  .scrim{position:fixed;inset:0;background:rgba(10,16,32,.45);display:flex;align-items:center;justify-content:center;z-index:50;}
  .popup{background:#fff;border-radius:16px;width:1180px;max-height:92vh;overflow:hidden;box-shadow:0 25px 60px -10px rgba(10,16,32,.35);display:flex;flex-direction:column;}

  .label-xs{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);}
  .val{font-size:12px;font-weight:600;color:var(--text);}

  .btn{font-size:12px;font-weight:700;border-radius:8px;padding:9px 14px;text-align:center;cursor:pointer;border:1px solid transparent;white-space:nowrap;transition:filter .15s,transform .1s;}
  .btn:hover{filter:brightness(.96);}
  .btn:active{transform:scale(.98);}
  .btn-outline{background:#fff;border:1px solid var(--border-strong);color:var(--text-soft);}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent);}
  .btn-disabled{opacity:.4;pointer-events:none;}

  .pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:999px;white-space:nowrap;}
  .pill-green{background:var(--green-bg);color:var(--green);}
  .pill-amber{background:var(--amber-bg);color:var(--amber);}
  .pill-red{background:var(--red-bg);color:var(--red);}
  .pill-blue{background:var(--blue-bg);color:var(--blue);}
  .pill-gray{background:#eef1f5;color:var(--text-muted);}
  .pill-orange{background:var(--orange-bg);color:var(--orange);}
  .pill-purple{background:var(--purple-bg);color:var(--purple);}

  .isa-tag{font-family:ui-monospace,Menlo,monospace;font-size:9px;background:#eef1f5;color:var(--text-muted);border-radius:4px;padding:1px 5px;display:inline-block;}

  .wo-card{border:1px solid var(--border);border-radius:10px;padding:11px 12px;cursor:pointer;transition:.12s;background:#fff;}
  .wo-card:hover{border-color:var(--accent);}
  .wo-card.selected{border-color:var(--accent);background:var(--blue-bg);box-shadow:0 0 0 1px var(--accent) inset;}
  .wo-card.eligible{border-color:var(--green-bd);}
  .wo-card.dimmed{opacity:.4;}

  .res-card{border:1px solid var(--border);border-radius:10px;padding:11px 12px;cursor:pointer;transition:.12s;background:#fff;}
  .res-card:hover{border-color:var(--accent);}
  .res-card.eligible{border-color:var(--green-bd);}
  .res-card.dimmed{opacity:.4;pointer-events:none;}
  .res-card.locked{border-color:var(--border-strong);background:var(--gray-bg);}

  .filter-chip{font-size:11px;font-weight:600;padding:5px 10px;border-radius:7px;border:1px solid var(--border-strong);color:var(--text-soft);cursor:pointer;white-space:nowrap;transition:.12s;}
  .filter-chip:hover{border-color:var(--accent);color:var(--accent);}
  .filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  .search-input{font-size:12.5px;border:1px solid var(--border-strong);border-radius:8px;padding:8px 10px 8px 32px;width:100%;}
  .search-input:focus{outline:none;border-color:var(--accent);}

  .col-header{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;font-size:12.5px;font-weight:600;padding:10px 18px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:100;display:flex;align-items:center;gap:8px;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
</style>
</head>
<body>

<!-- background placeholder dashboard -->
<div class="h-screen flex flex-col" style="filter:blur(3px) saturate(.9);transform:scale(1.01);">
  <div class="bg-toolbar flex items-center px-5 gap-3 text-white">
    <div class="w-6 h-6 rounded-full flex items-center justify-center font-extrabold text-[11px]" style="background:var(--cyan);color:var(--navy);">BD</div>
    <span class="font-bold text-[13px]">Smart Factory</span>
    <div class="flex-1"></div>
    <span class="text-[11px] text-white/60">Tijuana / Assembly Room / Line 1</span>
  </div>
</div>

<!-- ===================================================================
     WORK ORDER ASSIGNMENT
==================================================================== -->
<div class="scrim">
  <div class="popup">

    <!-- header -->
    <div class="flex items-center justify-between px-5 py-3 border-b" style="border-color:var(--border);">
      <div>
        <div class="text-[15px] font-extrabold">Work Order Assignment</div>
        <div class="text-[12px] mt-0.5" style="color:var(--text-muted);">Select a Work Order and a Resource, then confirm assignment.</div>
      </div>
      <div class="flex items-center gap-2">
        <button class="btn btn-outline" onclick="window.location.href='work-order-control-panel-v1.html'">Open Control Panel</button>
        <button class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-[var(--gray-bg)] text-[var(--text-muted)] font-bold text-lg">✕</button>
      </div>
    </div>

    <!-- body: split screen -->
    <div class="grid flex-1 min-h-0" style="grid-template-columns:1fr 1fr;">

      <!-- ============ LEFT: WORK ORDERS ============ -->
      <div class="flex flex-col min-h-0 border-r" style="border-color:var(--border);">
        <div class="px-4 pt-3 pb-2 border-b" style="border-color:var(--border);">
          <div class="col-header mb-2">Work Orders</div>
          <div class="relative mb-2">
            <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-4 h-4" style="color:var(--text-muted);" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="M21 21l-4.3-4.3"/></svg>
            <input class="search-input" placeholder="Search WO, SKU, batch, material…" oninput="filterWOs(this.value)">
          </div>
          <div class="flex gap-1.5 overflow-x-auto pb-1" id="woFilterRow">
            <span class="filter-chip active" data-f="all" onclick="setWoFilter('all',this)">All</span>
            <span class="filter-chip" data-f="created" onclick="setWoFilter('created',this)">Created</span>
            <span class="filter-chip" data-f="assigned" onclick="setWoFilter('assigned',this)">Assigned</span>
            <span class="filter-chip" data-f="auto" onclick="setWoFilter('auto',this)">Auto Assigned</span>
            <span class="filter-chip" data-f="custom" onclick="setWoFilter('custom',this)">Custom WO</span>
          </div>
        </div>
        <div id="woList" class="overflow-y-auto flex-1 px-4 py-3 flex flex-col gap-2"></div>
      </div>

      <!-- ============ RIGHT: RESOURCES ============ -->
      <div class="flex flex-col min-h-0" style="background:var(--gray-bg);">
        <div class="px-4 pt-3 pb-2 border-b" style="border-color:var(--border);background:#fff;">
          <div class="col-header mb-2">Resources <span id="resScopeLabel" class="font-normal" style="color:var(--text-muted);text-transform:none;letter-spacing:0;"></span></div>
          <div class="flex gap-1.5 overflow-x-auto pb-1" id="resFilterRow">
            <span class="filter-chip active" data-f="all" onclick="setResFilter('all',this)">All</span>
            <span class="filter-chip" data-f="available" onclick="setResFilter('available',this)">Available</span>
            <span class="filter-chip" data-f="running" onclick="setResFilter('running',this)">Running</span>
          </div>
        </div>
        <div id="resList" class="overflow-y-auto flex-1 px-4 py-3 flex flex-col gap-2"></div>
      </div>

    </div>

    <!-- footer: assignment bar -->
    <div class="flex items-center justify-between px-5 py-3 border-t" style="border-color:var(--border);background:#fff;">
      <div id="assignSummary" class="text-[12px]" style="color:var(--text-muted);">Select a Work Order and a Resource to assign.</div>
      <div class="flex items-center gap-2">
        <button id="clearBtn" class="btn btn-outline" onclick="clearSelection()">Clear</button>
        <button id="assignBtn" class="btn btn-disabled" style="background:var(--accent);color:#fff;" onclick="confirmAssignment()">Confirm Assignment</button>
      </div>
    </div>

  </div>
</div>

<div id="toast" class="toast"></div>

<script>
/* =====================================================================
   DATA
===================================================================== */
const WORK_ORDERS = [
  { wo:'WO-4503287', sku:'80-APX-50000', desc:'L2075-0245', batch:'1847', material:'PVC Catheter Shaft', workCenter:'AFA10', status:'assigned', equipment:'AFA10-Line-1', custom:false, planned:100000 },
  { wo:'WO-4503290', sku:'80-APX-60100', desc:'22GA Catheter', batch:'1851', material:'PVC Catheter Shaft', workCenter:'AFA10', status:'created', equipment:null, custom:false, planned:120000 },
  { wo:'WO-4503291', sku:'80-APX-50000', desc:'20GA Catheter (same SKU)', batch:'1852', material:'PVC Catheter Shaft', workCenter:'AFA10', status:'created', equipment:null, custom:false, planned:90000 },
  { wo:'WO-4503305', sku:'80-BLD-22010', desc:'Blister Pack Assembly', batch:'2210', material:'PETG Blister Sheet', workCenter:'PKG20', status:'created', equipment:null, custom:false, planned:45000 },
  { wo:'WO-4503312', sku:'80-BLD-22011', desc:'Blister Pack — Sterile', batch:'2211', material:'PETG Blister Sheet', workCenter:'PKG20', status:'auto', equipment:'PKG20-Cell-A', custom:false, planned:38000 },
  { wo:'MWO-1002', sku:'ENG-STUDY-01', desc:'Engineering Study — tip retention', batch:'—', material:'PVC Catheter Shaft', workCenter:'AFA10', status:'created', equipment:null, custom:true, planned:500 },
  { wo:'WO-4503320', sku:'80-APX-50000', desc:'20GA Catheter, lot retest', batch:'1855', material:'PVC Catheter Shaft', workCenter:'AFA10', status:'created', equipment:null, custom:false, planned:60000 }
];

const RESOURCES = [
  { id:'AFA10-Line-1', name:'AFA10 — Line 1', workCenter:'AFA10', state:'running', currentWo:'WO-4503287' },
  { id:'AFA10-Line-2', name:'AFA10 — Line 2', workCenter:'AFA10', state:'available', currentWo:null },
  { id:'AFA10-Line-3', name:'AFA10 — Line 3', workCenter:'AFA10', state:'down', currentWo:null },
  { id:'PKG20-Cell-A', name:'PKG20 — Cell A', workCenter:'PKG20', state:'running', currentWo:'WO-4503312' },
  { id:'PKG20-Cell-B', name:'PKG20 — Cell B', workCenter:'PKG20', state:'available', currentWo:null },
  { id:'AFA10-Bench-1', name:'AFA10 — Eng. Bench 1', workCenter:'AFA10', state:'available', currentWo:null }
];

let selectedWo = null;
let selectedRes = null;
let woFilter = 'all';
let resFilter = 'all';
let woSearch = '';

/* =====================================================================
   RENDER — WORK ORDERS
===================================================================== */
function statusPill(status){
  const map = {
    created:  ['pill-gray','Created'],
    assigned: ['pill-blue','Assigned'],
    auto:     ['pill-purple','Auto Assigned']
  };
  const [cls,label] = map[status] || map.created;
  return `<span class="pill ${cls}">${label}</span>`;
}

function woEligibleForSelectedRes(wo){
  if(!selectedRes) return true;
  return wo.workCenter === selectedRes.workCenter;
}
function resEligibleForSelectedWo(res){
  if(!selectedWo) return true;
  return res.workCenter === selectedWo.workCenter;
}

function renderWOs(){
  const list = document.getElementById('woList');
  const q = woSearch.toLowerCase();
  const filtered = WORK_ORDERS.filter(w=>{
    if(woFilter==='created' && w.status!=='created') return false;
    if(woFilter==='assigned' && w.status!=='assigned') return false;
    if(woFilter==='auto' && w.status!=='auto') return false;
    if(woFilter==='custom' && !w.custom) return false;
    if(q && !(`${w.wo} ${w.sku} ${w.batch} ${w.material} ${w.desc}`.toLowerCase().includes(q))) return false;
    return true;
  });

  if(filtered.length===0){
    list.innerHTML = `<div class="text-[12px] text-center py-8" style="color:var(--text-muted);">No Work Orders match this filter.</div>`;
    return;
  }

  list.innerHTML = filtered.map(w=>{
    const isSel = selectedWo && selectedWo.wo === w.wo;
    const eligible = woEligibleForSelectedRes(w);
    const locked = w.status==='assigned' && w.equipment; // started/assigned equipment can't be unassigned per spec
    let cls = 'wo-card';
    if(isSel) cls += ' selected';
    else if(selectedRes && eligible) cls += ' eligible';
    else if(selectedRes && !eligible) cls += ' dimmed';
    return `
    <div class="${cls}" onclick="selectWo('${w.wo}')">
      <div class="flex items-start justify-between gap-2">
        <div>
          <div class="flex items-center gap-2">
            <span class="font-bold text-[13px]">${w.wo}</span>
            ${w.custom ? '<span class="pill pill-orange">Custom WO</span>' : ''}
          </div>
          <div class="text-[11.5px] mt-0.5" style="color:var(--text-soft);">${w.desc}</div>
        </div>
        ${statusPill(w.status)}
      </div>
      <div class="flex items-center gap-3 mt-2 text-[11px]" style="color:var(--text-muted);">
        <span>SKU <b style="color:var(--text-soft);">${w.sku}</b></span>
        <span>Batch <b style="color:var(--text-soft);">${w.batch}</b></span>
        <span>WC <b style="color:var(--text-soft);">${w.workCenter}</b></span>
        <span>Planned <b style="color:var(--text-soft);">${w.planned.toLocaleString('en-US')}</b></span>
      </div>
      ${w.equipment ? `<div class="mt-2 text-[11px]" style="color:var(--text-muted);">Equipment: <span class="isa-tag">${w.equipment}</span>${locked ? ' <span style="color:var(--amber);font-weight:700;">· locked (started)</span>' : ''}</div>` : ''}
    </div>`;
  }).join('');
}

/* =====================================================================
   RENDER — RESOURCES
===================================================================== */
function resStatePill(state){
  const map = {
    running:   ['pill-green','Running'],
    available: ['pill-blue','Available'],
    down:      ['pill-red','Down']
  };
  const [cls,label] = map[state] || map.available;
  return `<span class="pill ${cls}">${label}</span>`;
}

function renderResources(){
  const list = document.getElementById('resList');
  const scopeLabel = document.getElementById('resScopeLabel');
  scopeLabel.textContent = selectedWo ? `— filtered to Work Center ${selectedWo.workCenter}` : '';

  const filtered = RESOURCES.filter(r=>{
    if(resFilter==='available' && r.state!=='available') return false;
    if(resFilter==='running' && r.state!=='running') return false;
    return true;
  });

  if(filtered.length===0){
    list.innerHTML = `<div class="text-[12px] text-center py-8" style="color:var(--text-muted);">No Resources match this filter.</div>`;
    return;
  }

  list.innerHTML = filtered.map(r=>{
    const isSel = selectedRes && selectedRes.id === r.id;
    const eligible = resEligibleForSelectedWo(r);
    const lockedByRunning = r.state==='running' && r.currentWo && (!selectedWo || selectedWo.wo !== r.currentWo);
    let cls = 'res-card';
    if(isSel) cls += ' selected';
    else if(selectedWo && eligible && r.state!=='down') cls += ' eligible';
    else if(selectedWo && !eligible) cls += ' dimmed';
    if(r.state==='down') cls += ' locked';
    return `
    <div class="${cls}" onclick="selectRes('${r.id}')" style="${isSel?'border-color:var(--accent);background:var(--blue-bg);box-shadow:0 0 0 1px var(--accent) inset;':''}">
      <div class="flex items-start justify-between gap-2">
        <div>
          <div class="font-bold text-[13px]">${r.name}</div>
          <div class="text-[11px] mt-0.5" style="color:var(--text-muted);">Work Center <b style="color:var(--text-soft);">${r.workCenter}</b></div>
        </div>
        ${resStatePill(r.state)}
      </div>
      ${r.currentWo ? `<div class="mt-2 text-[11px]" style="color:var(--text-muted);">Currently running: <span class="isa-tag">${r.currentWo}</span></div>` : ''}
      ${r.state==='down' ? `<div class="mt-2 text-[11px] font-semibold" style="color:var(--red);">Equipment unavailable</div>` : ''}
    </div>`;
  }).join('');
}

/* =====================================================================
   SELECTION LOGIC
===================================================================== */
function selectWo(woId){
  const w = WORK_ORDERS.find(x=>x.wo===woId);
  selectedWo = (selectedWo && selectedWo.wo===woId) ? null : w;
  renderAll();
}
function selectRes(resId){
  const r = RESOURCES.find(x=>x.id===resId);
  if(r.state==='down') return;
  selectedRes = (selectedRes && selectedRes.id===resId) ? null : r;
  renderAll();
}
function clearSelection(){
  selectedWo = null; selectedRes = null;
  renderAll();
}
function setWoFilter(f, el){
  woFilter = f;
  document.querySelectorAll('#woFilterRow .filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderWOs();
}
function setResFilter(f, el){
  resFilter = f;
  document.querySelectorAll('#resFilterRow .filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderResources();
}
function filterWOs(v){
  woSearch = v;
  renderWOs();
}

function renderSummaryBar(){
  const summary = document.getElementById('assignSummary');
  const btn = document.getElementById('assignBtn');
  if(selectedWo && selectedRes){
    const eligible = selectedWo.workCenter === selectedRes.workCenter;
    if(eligible){
      summary.innerHTML = `Assign <b>${selectedWo.wo}</b> (${selectedWo.sku}) to <b>${selectedRes.name}</b>?`;
      summary.style.color = 'var(--text)';
      btn.classList.remove('btn-disabled');
    } else {
      summary.innerHTML = `<span style="color:var(--red);font-weight:600;">Not eligible</span> — ${selectedWo.wo} requires Work Center ${selectedWo.workCenter}, but ${selectedRes.name} is in ${selectedRes.workCenter}.`;
      btn.classList.add('btn-disabled');
    }
  } else if(selectedWo){
    summary.innerHTML = `<b>${selectedWo.wo}</b> selected — choose an eligible Resource.`;
    summary.style.color = 'var(--text-muted)';
    btn.classList.add('btn-disabled');
  } else if(selectedRes){
    summary.innerHTML = `<b>${selectedRes.name}</b> selected — choose an eligible Work Order.`;
    summary.style.color = 'var(--text-muted)';
    btn.classList.add('btn-disabled');
  } else {
    summary.textContent = 'Select a Work Order and a Resource to assign.';
    summary.style.color = 'var(--text-muted)';
    btn.classList.add('btn-disabled');
  }
}

function renderAll(){
  renderWOs();
  renderResources();
  renderSummaryBar();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function confirmAssignment(){
  if(!selectedWo || !selectedRes || selectedWo.workCenter !== selectedRes.workCenter) return;
  selectedWo.status = 'assigned';
  selectedWo.equipment = selectedRes.id;
  showToast(`${selectedWo.wo} assigned to ${selectedRes.name}`);
  const assignedWo = selectedWo.wo;
  setTimeout(()=>{
    window.location.href = `work-order-control-panel-v1.html?wo=${encodeURIComponent(assignedWo)}`;
  }, 900);
}

/* INIT */
renderAll();
</script>
</body>
</html>
